<div class="toast" [class.toast-show]="saved()" [class.toast-error]="isError()">{{ toast }}</div>
<div class="progress-bar" *ngIf="isSaving()">
  <div class="progress-fill" [style.width.%]="progress()"></div>
</div>

<main class="main">

  <header class="page-hdr">
    <div>
      <h1 class="page-title">Pointage Employé</h1>
      <p class="page-sub">Gestion hebdomadaire des présences par compagnie</p>
    </div>
    <div class="page-actions">
      <button class="btn btn-outline">↓ Exporter</button>
      <button class="btn btn-primary" [disabled]="isSaving()" (click)="save()">
        <span *ngIf="!isSaving()">💾 Sauvegarder</span>
        <span *ngIf="isSaving()" class="spinner"></span>
      </button>
    </div>
  </header>

  <app-employee-form
    [employee]="employee()"
    (weekChange)="onWeekChange()"
    (employeeChange)="onEmployeeChange($event)">
  </app-employee-form>

  <app-stats-bar></app-stats-bar>

  <app-date-picker (weekChange)="onWeekChange()"></app-date-picker>

  <section class="section">
    <app-section-header
      mode="employee"
      icon="👤"
      title="Pointage Employé"
      subtitle="Cochez les jours de présence par compagnie">
      <button class="btn btn-sm btn-ghost"
              (click)="ptEmpSvc.selectAll(weekSvc.weekDays())">Tout ✓</button>
      <button class="btn btn-sm btn-ghost"
              (click)="ptEmpSvc.clearAll()">Effacer</button>
    </app-section-header>
    <app-pointage-table mode="employee"></app-pointage-table>
  </section>

  <section class="section">
    <app-section-header
      mode="admin"
      icon="🛡"
      title="Pointage Validé par Admin"
      subtitle="Validation administrative des présences">
      <span class="badge-div" *ngIf="admSvc.divergences() > 0">
        {{ admSvc.divergences() }} non validé{{ admSvc.divergences() > 1 ? 's' : '' }}
      </span>
      <button class="btn btn-sm btn-ghost"
              (click)="admSvc.copyFromEmployee()">Copier depuis employé</button>
      <button class="btn btn-sm btn-danger"
              (click)="admSvc.clearAll()">Réinitialiser</button>
    </app-section-header>
    <app-pointage-table mode="admin"></app-pointage-table>
  </section>

</main>
