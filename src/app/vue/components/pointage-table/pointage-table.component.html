<div class="table-scroll">
  <table class="ptable">
    <thead>
      <tr>
        <th class="th-arrow"></th>
        <th class="th-comp">Compagnie</th>
        <th class="th-total">Total</th>
        <th *ngFor="let day of weekDays; trackBy: trackByKey"
            class="th-day"
            [class.th-today]="day.isToday"
            [class.th-weekend]="day.isWeekend">
          <span class="day-label-full">{{ day.labelFull }}</span>
          <span class="day-label-short">{{ day.labelShort }}</span>
          <span *ngIf="day.isToday" class="today-badge">Auj.</span>
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of compagnies; let odd = odd; trackBy: trackById"
          class="row"
          [class.row-sel]="c.selected"
          [class.row-odd]="odd"
          (click)="select(c)">
        <td class="td-arrow">
          <span *ngIf="c.selected">▶</span>
        </td>
        <td class="td-comp">
          <div class="comp-name">
            <div class="comp-dot" [class.dot-sel]="c.selected"></div>
            {{ c.nom }}
          </div>
        </td>
        <td class="td-total">
          <span class="total-badge" [class.total-nz]="count(c) > 0">
            {{ count(c) }}/7
          </span>
        </td>
        <td *ngFor="let day of weekDays; trackBy: trackByKey"
            class="td-check"
            [class.td-today]="day.isToday"
            [class.td-weekend]="day.isWeekend"
            [class.td-locked]="locked && !isAdmin"
            (click)="toggle(c, day.dateKey, $event)">
          <div class="cell-wrap">
            <button class="chk"
                    [class.chk-on]="isChecked(c, day.dateKey)"
                    [class.chk-admin]="isAdmin"
                    [class.chk-locked]="locked && !isAdmin"
                    [disabled]="!canEdit"
                    type="button">
              <span *ngIf="isChecked(c, day.dateKey)">✓</span>
            </button>
            <span class="cell-price" *ngIf="isChecked(c, day.dateKey) && c.prices?.[day.dateKey]">
              {{ c.prices![day.dateKey] | number:'1.2-2' }}&nbsp;$
            </span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
